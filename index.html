<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADARLAT RADIO</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* REPRODUCTOR FIJO ARRIBA */
        .player-header {
            position: sticky;
            top: 0;
            width: 100%;
            background: #111;
            padding: 20px 0;
            z-index: 1000;
            text-align: center;
            border-bottom: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }

        #radio-title { 
            font-size: 12px; 
            color: #888; 
            text-transform: uppercase; 
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        audio { width: 90%; max-width: 400px; height: 35px; filter: invert(100%); }

        /* CONTENIDO DESLIZABLE */
        .content {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }

        .category-label {
            font-weight: bold;
            font-size: 14px;
            color: #555;
            margin: 20px 0 15px 5px;
            text-transform: uppercase;
        }

        .grid-radios { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
        }

        .radio-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            cursor: pointer;
        }

        .icon-box { 
            background-color: #fff; 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            margin-bottom: 8px;
        }

        .icon-box img { 
            width: 75%; 
            height: auto; 
            object-fit: contain; 
        }

        .radio-name { 
            color: #fff; 
            font-size: 10px; 
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="player-header">
        <div id="radio-title">ESCUCHANDO: SELECCIONA UNA RADIO</div>
        <audio id="audio-player" controls autoplay>
            <source id="audio-source" src="" type="audio/mpeg">
        </audio>
    </div>

    <div class="content">
        <div class="category-label">RADIOS ARGENTINAS</div>
        <div class="grid-radios">
            <div class="radio-item" onclick="playRadio('RADIO MITRE', 'https://cienradios-stream.com/mitre.mp3')">
                <div class="icon-box"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Logo_Mitre_SA.svg/1280px-Logo_Mitre_SA.svg.png"></div>
                <div class="radio-name">Radio Mitre</div>
            </div>
            <div class="radio-item" onclick="playRadio('LA 100', 'https://cienradios-stream.com/la100.mp3')">
                <div class="icon-box"><img src="https://mir-s3-cdn-cf.behance.net/projects/404/69666729.547900b99217a.png"></div>
                <div class="radio-name">La 100</div>
            </div>
            <div class="radio-item" onclick="playRadio('ASPEN', 'https://streaming.latam.pro/8014/stream')">
                <div class="icon-box"><img src="https://mir-s3-cdn-cf.behance.net/project_modules/disp/33215b24346903.563332467657d.png"></div>
                <div class="radio-name">Aspen</div>
            </div>
        </div>

        <div class="category-label">LATINOAMÉRICA</div>
        <div class="grid-radios">
            <div class="radio-item" onclick="playRadio('RPP NOTICIAS', 'https://18543.live.streamtheworld.com/RPP_SC')">
                <div class="icon-box"><img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Logo_RPP_2017.png"></div>
                <div class="radio-name">RPP</div>
            </div>
            <div class="radio-item" onclick="playRadio('CARACOL RADIO', 'https://20813.live.streamtheworld.com/CARACOL_RADIO_SC')">
                <div class="icon-box"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Caracol_Radio_logo.svg/1200px-Caracol_Radio_logo.svg.png"></div>
                <div class="radio-name">Caracol Radio</div>
            </div>
        </div>
    </div>

    <script>
        function playRadio(name, url) {
            const player = document.getElementById('audio-player');
            const source = document.getElementById('audio-source');
            const title = document.getElementById('radio-title');
            title.innerText = "ESCUCHANDO: " + name;
            source.src = url;
            player.load();
            player.play();
        }
    </script>
<script src="https://pl29216392.profitablecpmratenetwork.com/3a/8d/7f/3a8d7fe0fbbb500772dcf370ff6b85bf.js"></script>
 </body>
</html>
