<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADARLAT RADIO</title>
    <style>
        /* Estética RadarLat Original */
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* Reproductor Superior Minimalista */
        .player-header {
            width: 100%;
            max-width: 500px;
            background: #111;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #radio-title { 
            font-size: 14px; 
            color: #aaa; 
            text-transform: uppercase; 
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        audio { width: 100%; height: 40px; }

        /* Estilo de Etiquetas de Categoría */
        .category-label {
            width: 100%;
            max-width: 500px;
            font-weight: bold;
            font-size: 16px;
            color: #888;
            margin: 20px 0 15px 0;
            text-align: left;
        }

        /* Grilla de Iconos Redondeados (Idéntica a tu captura) */
        .grid-radios { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            width: 100%; 
            max-width: 500px; 
        }

        .radio-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-decoration: none; 
            cursor: pointer;
        }

        .icon-box { 
            background-color: #fff; 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 18px; /* El redondeado exacto de tu foto */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            margin-bottom: 8px;
            transition: transform 0.2s;
        }

        .icon-box:active { transform: scale(0.95); }

        .icon-box img { 
            width: 80%; 
            height: auto; 
            object-fit: contain; 
        }

        .radio-name { 
            color: #fff; 
            font-size: 11px; 
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="player-header">
        <div id="radio-title">Selecciona una emisora</div>
        <audio id="audio-player" controls autoplay>
            <source id="audio-source" src="" type="audio/mpeg">
        </audio>
    </div>

    <div class="category-label">RADIOS ARGENTINAS</div>

    <div class="grid-radios">
        <div class="radio-item" onclick="playRadio('Radio Mitre', 'https://cienradios-stream.com/mitre.mp3')">
            <div class="icon-box"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR07fJ06jE7PIm0E9o6iO8V_Xz7f6E_Yf0vZA&s"></div>
            <div class="radio-name">Radio Mitre</div>
        </div>

        <div class="radio-item" onclick="playRadio('La 100', 'https://cienradios-stream.com/la100.mp3')">
            <div class="icon-box"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS8Xh_p9QjOQYp6I2U6mX_9vH3r_v4eN6E9gA&s"></div>
            <div class="radio-name">La 100</div>
        </div>

        <div class="radio-item" onclick="playRadio('Aspen 102.3', 'https://streaming.latam.pro/8014/stream')">
            <div class="icon-box"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR8n0e_J9z8e0v-G_pX0uH9G4J6f0e_6f0vZA&s"></div>
            <div class="radio-name">Aspen</div>
        </div>
    </div>

    <div class="category-label">LATINOAMÉRICA</div>

    <div class="grid-radios">
        <div class="radio-item" onclick="playRadio('RPP Noticias', 'https://18543.live.streamtheworld.com/RPP_SC')">
            <div class="icon-box"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAtC1P54_1_Vf6I6_p_2o8M_5mH_WpX_f_VA&s"></div>
            <div class="radio-name">RPP</div>
        </div>

        <div class="radio-item" onclick="playRadio('Caracol Radio', 'https://20813.live.streamtheworld.com/CARACOL_RADIO_SC')">
            <div class="icon-box"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTXA_hZpU0A3Lz4_Y4I_7R8pG_A_f_H_f_VA&s"></div>
            <div class="radio-name">Caracol Radio</div>
        </div>
    </div>

    <script>
        function playRadio(name, url) {
            const player = document.getElementById('audio-player');
            const source = document.getElementById('audio-source');
            const title = document.getElementById('radio-title');
            title.innerText = "Escuchando: " + name;
            source.src = url;
            player.load();
            player.play();
        }
    </script>
<script src="https://pl29216392.profitablecpmratenetwork.com/3a/8d/7f/3a8d7fe0fbbb500772dcf370ff6b85bf.js"></script>
   </body>
</html>
