    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; padding-bottom: 100px; overflow-x: hidden; }
        #rl-container-fuerza { position: sticky; top: 0; width: 100%; background: #0b0e11; border-bottom: 2px solid #4CAF50; z-index: 2000; }
        .r1-carrusel-centrado { display: flex; overflow-x: auto; gap: 20px; padding: 10px 15px; align-items: center; -webkit-overflow-scrolling: touch; }
        .r1-carrusel-centrado::-webkit-scrollbar { display: none; }
        .btn-pais { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; min-width: 50px; cursor: pointer; }
        .btn-pais img, .world-icon { width: 44px; height: 32px; border-radius: 6px; border: 2px solid transparent; object-fit: cover; }
        .btn-pais.active img, .btn-pais.active .world-icon { border-color: #4CAF50; box-shadow: 0 0 10px #4CAF50; }
        .btn-pais span { font-size: 10px; color: #777; margin-top: 5px; font-weight: bold; text-transform: uppercase; }
        .btn-pais.active span { color: #4CAF50; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden; border-bottom: 1px solid #222; }
        #main-video-player, #hls-video-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        #main-video-player.active, #hls-video-player.active { display: block; }
        .main-content { padding: 10px 0; }
        .rl-card { margin-bottom: 30px; display: block; }
        .country-header { font-size: 0.9rem; font-weight: bold; color: #fff; margin: 15px; text-transform: uppercase; border-left: 4px solid #4CAF50; padding-left: 12px; }
        .channels-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 0 15px 10px; }
        .channels-scroll::-webkit-scrollbar { display: none; }
        .logo-box { width: 110px; height: 110px; background: #fff; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .logo-box img { width: 80%; height: auto; object-fit: contain; }
        .channel-name { font-size: 0.8rem; font-weight: bold; text-align: center; display: block; color: #fff; }
        .bottom-navbar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; z-index: 3000; }
        .nav-link { text-decoration: none; color: #fff; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; text-transform: uppercase; }
        .dot { height: 8px; width: 8px; background-color: #ff0000; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px #f00; animation: parpadeo 1.5s infinite; }
        @keyframes parpadeo { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>

<script>
    const config = [
        {id:'ar', full:'ARGENTINA', c:[{n:'TN', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'C5N', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'cl', full:'CHILE', c:[{n:'TVN', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'24H', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'uy', full:'URUGUAY', c:[{n:'CANAL 5', l:'https://vood.io', img:'https://wikimedia.org'},{n:'TELEMUNDO', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'py', full:'PARAGUAY', c:[{n:'NPY', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'ABC TV', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'br', full:'BRASIL', c:[{n:'SBT', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'RECORD', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'pe', full:'PERÚ', c:[{n:'TV PERU', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'ATV', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'bo', full:'BOLIVIA', c:[{n:'UNITEL', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'RED UNO', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'ec', full:'ECUADOR', c:[{n:'TC TV', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'TELEAMAZONAS', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'ve', full:'VENEZUELA', c:[{n:'VPI TV', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'TELESUR', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'co', full:'COLOMBIA', c:[{n:'CARACOL', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'RCN', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'mx', full:'MÉXICO', c:[{n:'FORO TV', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'MILENIO', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'pa', full:'PANAMÁ', c:[{n:'TVN PA', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'TELEMETRO', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'gt', full:'GUATEMALA', c:[{n:'TN23', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'GUATEVISION', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'sv', full:'EL SALVADOR', c:[{n:'TCS+', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'CANAL 10', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'ni', full:'NICARAGUA', c:[{n:'CANAL 10', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'VOS TV', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'hn', full:'HONDURAS', c:[{n:'HCH', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'TSI', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'cr', full:'COSTA RICA', c:[{n:'TELETICA', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'RERETEL', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'cu', full:'CUBA', c:[{n:'CUBAVISION', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'CANAL CARIBE', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'do', full:'REP. DOMINICANA', c:[{n:'TELEMANTILLAS', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'COLOR VISION', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'pr', full:'PUERTO RICO', c:[{n:'WAPA', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'TELEMUNDO PR', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'us', full:'EE.UU.', c:[{n:'ABC NEWS', l:'https://youtube.com', img:'https://wikimedia.org'},{n:'CBS NEWS', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'es', full:'ESPAÑA', c:[{n:'RTVE 24H', l:'https://akamaized.net', img:'https://wikimedia.org'},{n:'LA SEXTA', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'fr', full:'FRANCIA', c:[{n:'FRANCE 24', l:'https://france24.com', img:'https://wikimedia.org'},{n:'EURONEWS', l:'https://youtube.com', img:'https://wikimedia.org'}]},
        {id:'de', full:'ALEMANIA', c:[{n:'DW ESPAÑOL', l:'https://akamaized.net', img:'https://wikimedia.org'},{n:'WELT', l:'https://youtube.com', img:'https://wikimedia.org'}]}
    ];

    function render(filtro = 'all') {
        const container = document.getElementById('contenedor-canales');
        container.innerHTML = "";
        config.forEach(p => {
            if (filtro === 'all' || p.id === filtro) {
                const card = document.createElement('div');
                card.className = `rl-card ${p.id}`;
                let html = `<div class="country-header">${p.full}</div><div class="channels-scroll">`;
                p.c.forEach(c => {
                    html += `<div class="channel-item" onclick="cargarContenido('${c.l}')">
                                <div class="logo-box"><img src="${c.img}" loading="lazy"></div>
                                <span class="channel-name">${p.id === 'all' ? p.id.toUpperCase() : ''} ${c.n}</span>
                             </div>`;
                });
                html += `</div>`;
                card.innerHTML = html;
                container.appendChild(card);
            }
        });
    }

    function cargarContenido(url) {
        const yt = document.getElementById('main-video-player'), hls = document.getElementById('hls-video-player');
        yt.src = ""; hls.pause(); yt.classList.remove('active'); hls.classList.remove('active');
        if (url.includes('youtube.com')) { yt.src = url; yt.classList.add('active'); }
        else {
            hls.classList.add('active');
            if (Hls.isSupported()) { const h = new Hls(); h.loadSource(url); h.attachMedia(hls); }
            else if (hls.canPlayType('application/vnd.apple.mpegurl')) { hls.src = url; }
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filtrarRadar(id, el) {
        document.querySelectorAll('.btn-pais').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        render(id);
    }

    window.onload = () => { render('all'); cargarContenido('https://youtube.com'); };
</script>
