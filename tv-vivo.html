    function render(filtro = 'all') {
        const container = document.getElementById('contenedor-canales');
        container.innerHTML = "";
        config.forEach(p => {
            if (filtro === 'all' || p.id === filtro) {
                const card = document.createElement('div');
                card.className = `rl-card ${p.id}`;
                let html = `<div class="country-header">${p.full}</div><div class="channels-scroll">`;
                p.c.forEach(c => {
                    html += `<div class="channel-item" onclick="cargarContenido('${c.l}')">
                                <div class="logo-box"><img src="${c.img}" loading="lazy"></div>
                                <span class="channel-name">${c.n}</span>
                             </div>`;
                });
                html += `</div>`;
                card.innerHTML = html;
                container.appendChild(card);
            }
        });
    }

    function cargarContenido(url) {
        const yt = document.getElementById('main-video-player'), hls = document.getElementById('hls-video-player');
        yt.src = ""; hls.pause(); yt.classList.remove('active'); hls.classList.remove('active');
        if (url.includes('youtube.com')) { yt.src = url; yt.classList.add('active'); }
        else {
            hls.classList.add('active');
            if (Hls.isSupported()) { const h = new Hls(); h.loadSource(url); h.attachMedia(hls); }
            else if (hls.canPlayType('application/vnd.apple.mpegurl')) { hls.src = url; }
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filtrarRadar(id, el) {
        document.querySelectorAll('.btn-pais').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        render(id);
    }

  window.onload = () => {
    // En lugar de render('all'), carga solo el primer país (ej: Argentina)
    render('ar'); 
    
    // Activa el reproductor
    cargarContenido('https://youtube.com');
};
