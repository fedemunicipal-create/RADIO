<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADARLAT TV-VIVO</title>
    <script src="https://jsdelivr.net"></script>
    
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }

        /* 1. BANDERAS (CORREGIDAS) */
        #rl-container-fuerza { position: sticky; top: 0; width: 100%; background: #0b0e11; border-bottom: 2px solid #4CAF50; z-index: 2000; }
        .r1-carrusel-centrado { display: flex; overflow-x: auto; gap: 20px; padding: 10px 15px; align-items: center; -webkit-overflow-scrolling: touch; }
        .r1-carrusel-centrado::-webkit-scrollbar { display: none; }
        .btn-pais { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; min-width: 50px; cursor: pointer; }
        .btn-pais img, .world-icon { width: 44px; height: 32px; border-radius: 6px; border: 2px solid transparent; object-fit: cover; }
        .btn-pais.active img, .btn-pais.active .world-icon { border-color: #4CAF50; box-shadow: 0 0 10px #4CAF50; }
        .btn-pais span { font-size: 10px; color: #777; margin-top: 5px; font-weight: bold; text-transform: uppercase; }
        .btn-pais.active span { color: #4CAF50; }

        /* 2. REPRODUCTOR */
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        #main-video-player, #hls-video-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        #main-video-player.active, #hls-video-player.active { display: block; }

        /* 3. CANALES */
        .main-content { padding: 10px 0; }
        .rl-card { margin-bottom: 30px; }
        .country-header { font-size: 0.85rem; font-weight: bold; color: #ccc; margin: 15px; text-transform: uppercase; border-left: 3px solid #4CAF50; padding-left: 10px; }
        .channels-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 0 15px 10px; }
        .logo-box { width: 115px; height: 115px; background: #fff; border-radius: 22px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .logo-box img { width: 80%; height: auto; }
        .channel-name { font-size: 0.8rem; font-weight: bold; text-align: center; display: block; color: #fff; }

        /* 4. MENÚ INFERIOR (CON LUZ ROJA EN LOS TRES) */
        .bottom-navbar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; z-index: 3000; }
        .nav-link { text-decoration: none; color: #fff; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; }
        .dot { height: 7px; width: 7px; background-color: #ff0000; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px #ff0000; animation: parpadeo 1.5s infinite; }
        @keyframes parpadeo { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <!-- MENÚ DE BANDERAS -->
    <div id="rl-container-fuerza">
        <div class="r1-carrusel-centrado" id="banderas-carrusel">
            <!-- Se llena con JS para asegurar que todos estén presentes -->
        </div>
    </div>

    <!-- REPRODUCTOR -->
    <div class="video-container">
        <iframe id="main-video-player" class="active" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <video id="hls-video-player" controls autoplay playsinline></video>
    </div>

    <!-- BANNER ADSTERRA -->
    <div style="width:100%; text-align:center; padding:10px 0; background:#0b0e11;">
        <script type="text/javascript">
            atOptions = { 'key' : '2518913e078a8274472eea34aba82089', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://highperformanceformat.com"></script>
    </div>

    <!-- CONTENEDOR DE CANALES -->
    <div class="main-content" id="contenedor-canales"></div>

    <!-- MENÚ INFERIOR -->
    <nav class="bottom-navbar">
        <a href="LINK_PAGINA_AQUI" class="nav-link"><span class="dot"></span>RADIO</a>
        <a href="LINK_PAGINA_AQUI" class="nav-link"><span class="dot"></span>VOLVER</a>
        <a href="LINK_PAGINA_AQUI" class="nav-link"><span class="dot"></span>PORTALES</a>
    </nav>

    <script>
        const paises = [
            {id:'all', n:'TODOS', icon:'🌐'}, {id:'ar', n:'ARG', f:'ar'}, {id:'cl', n:'CHI', f:'cl'}, 
            {id:'uy', n:'URU', f:'uy'}, {id:'it', n:'ITA', f:'it'}, {id:'py', n:'PAR', f:'py'},
            {id:'br', n:'BRA', f:'br'}, {id:'pe', n:'PER', f:'pe'}, {id:'bo', n:'BOL', f:'bo'},
            {id:'ec', n:'ECU', f:'ec'}, {id:'ve', n:'VEN', f:'ve'}, {id:'co', n:'COL', f:'co'},
            {id:'mx', n:'MEX', f:'mx'}, {id:'pa', n:'PAN', f:'pa'}, {id:'gt', n:'GUA', f:'gt'},
            {id:'sv', n:'SAL', f:'sv'}, {id:'ni', n:'NIC', f:'ni'}, {id:'hn', n:'HON', f:'hn'},
            {id:'cr', n:'COS', f:'cr'}, {id:'cu', n:'CUB', f:'cu'}, {id:'do', n:'DOM', f:'do'},
            {id:'pr', n:'PUE', f:'pr'}, {id:'us', n:'USA', f:'us'}, {id:'es', n:'ESP', f:'es'},
            {id:'fr', n:'FRA', f:'fr'}, {id:'de', n:'ALE', f:'de'}
        ];

        const canalesData = [
            { id: 'ar', n: 'Argentina', items: [{ n: 'TN', l: 'https://youtube.com', img: 'https://wikimedia.org' }] },
            { id: 'cl', n: 'Chile', items: [{ n: 'TVN Chile', l: 'https://youtube.com', img: 'https://wikimedia.org' }] },
            { id: 'uy', n: 'Uruguay', items: [{ n: 'Canal 5 Uy', l: 'https://vood.io', img: 'https://wikimedia.org' }] },
            { id: 'it', n: 'Italia', items: [{ n: 'Rai News 24', l: 'https://akamaized.net', img: 'https://wikimedia.org' }] }
        ];

        function init() {
            const carrusel = document.getElementById('banderas-carrusel');
            paises.forEach(p => {
                const div = document.createElement('div');
                div.className = `btn-pais ${p.id === 'all' ? 'active' : ''}`;
                div.onclick = function() { filtrarRadar(p.id, this); };
                const img = p.f ? `<img src="https://flagcdn.com{p.f}.png">` : `<div class="world-icon" style="background:#222; width:44px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:6px;">${p.icon}</div>`;
                div.innerHTML = `${img}<span>${p.n}</span>`;
                carrusel.appendChild(div);
            });

            const container = document.getElementById('contenedor-canales');
            paises.filter(p => p.id !== 'all').forEach(p => {
                const sec = document.createElement('div');
                sec.className = `rl-card ${p.id}`;
                const data = canalesData.find(d => d.id === p.id);
                let html = `<div class="country-header">${p.n}</div>`;
                if (data) {
                    html += `<div class="channels-scroll">` + data.items.map(c => `
                        <div class="channel-item" onclick="cargarContenido('${c.l}')">
                            <div class="logo-box"><img src="${c.img}"></div>
                            <span class="channel-name">${c.n}</span>
                        </div>`).join('') + `</div>`;
                } else {
                    html += `<div style="padding:0 20px; font-size:0.7rem; color: #444;">Próximamente...</div>`;
                }
                sec.innerHTML = html;
                container.appendChild(sec);
            });
        }

        function cargarContenido(url) {
            const yt = document.getElementById('main-video-player');
            const hls = document.getElementById('hls-video-player');
            yt.src = ""; hls.pause();
            yt.classList.remove('active'); hls.classList.remove('active');
            if (url.includes('youtube.com')) {
                yt.src = url; yt.classList.add('active');
            } else {
                hls.classList.add('active');
                if (Hls.isSupported()) { const h = new Hls(); h.loadSource(url); h.attachMedia(hls); }
                else if (hls.canPlayType('application/vnd.apple.mpegurl')) { hls.src = url; }
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filtrarRadar(id, el) {
            document.querySelectorAll('.btn-pais').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.rl-card').forEach(c => {
                c.style.display = (id === 'all' || c.classList.contains(id)) ? 'block' : 'none';
            });
        }

        window.onload = () => { init(); cargarContenido('https://youtube.com'); };
    </script>
</body>
</html>
