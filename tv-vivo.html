    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* 1. BANNER DE BANDERAS (STICKY) */
        #rl-container-fuerza {
            position: sticky;
            top: 0;
            width: 100%;
            background: #0b0e11;
            border-bottom: 2px solid #4CAF50;
            z-index: 2000;
        }

        .r1-carrusel-centrado {
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: nowrap !important;
            overflow-x: auto !important;
            gap: 20px;
            padding: 10px 15px;
            align-items: center;
            -webkit-overflow-scrolling: touch;
        }
        .r1-carrusel-centrado::-webkit-scrollbar { display: none; }

        .btn-pais {
            flex: 0 0 auto;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            min-width: 50px;
            cursor: pointer;
        }

        .btn-pais img, .btn-pais .world-icon {
            width: 44px;
            height: 32px;
            border-radius: 6px;
            border: 2px solid transparent;
            object-fit: cover;
        }

        .btn-pais.active img, .btn-pais.active .world-icon {
            border-color: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .world-icon {
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .btn-pais span {
            font-size: 10px;
            color: #777;
            margin-top: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .btn-pais.active span { color: #4CAF50; }

        /* 2. REPRODUCTOR FIJO (ADAPTADO A MÓVIL) */
        .video-container {
            width: 100%;
            max-width: 100vw;
            aspect-ratio: 16 / 9;
            background: #000;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid #222;
        }
        #main-video-player, #hls-video-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        #main-video-player.active, #hls-video-player.active {
            display: block;
        }

        /* 3. GRILLA DE CANALES */
        .main-content { padding: 10px 0; }
        .rl-card { margin-bottom: 30px; display: block; }
        .country-header {
            font-size: 0.9rem;
            font-weight: bold;
            color: #fff;
            margin: 15px 15px 10px;
            text-transform: uppercase;
            border-left: 4px solid #4CAF50;
            padding-left: 12px;
        }

        .channels-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 0 15px 10px;
        }
        .channels-scroll::-webkit-scrollbar { display: none; }

        .channel-item {
            min-width: 110px;
            text-align: center;
            cursor: pointer;
        }

        .logo-box {
            width: 110px;
            height: 110px;
            background: #fff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .logo-box img { width: 80%; height: auto; object-fit: contain; }

        .channel-name { 
            font-size: 0.8rem; 
            font-weight: bold; 
            display: block;
            color: #fff;
        }

        /* 4. MENÚ INFERIOR (3 LUCES ROJAS) */
        .bottom-navbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 75px;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #1a1a1a;
            z-index: 3000;
        }

        .nav-link {
            text-decoration: none;
            color: #fff;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            text-transform: uppercase;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #ff0000;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #ff0000;
            animation: parpadeo_vivo 1.5s infinite;
        }

        @keyframes parpadeo_vivo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>

<script>
    const ytPlayer = document.getElementById('main-video-player');
    const hlsPlayer = document.getElementById('hls-video-player');

    function cargarContenido(url) {
        ytPlayer.src = ""; hlsPlayer.pause();
        ytPlayer.classList.remove('active'); hlsPlayer.classList.remove('active');

        if (url.includes('youtube.com')) {
            ytPlayer.src = url; ytPlayer.classList.add('active');
        } else {
            hlsPlayer.classList.add('active');
            if (Hls.isSupported()) {
                const hls = new Hls(); hls.loadSource(url); hls.attachMedia(hlsPlayer);
            } else if (hlsPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                hlsPlayer.src = url;
            }
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filtrarRadar(id, el) {
        document.querySelectorAll('.btn-pais').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.rl-card').forEach(card => {
            card.style.display = (id === 'all' || card.classList.contains(id)) ? 'block' : 'none';
        });
    }

    window.onload = () => { cargarContenido('https://youtube.com'); };
</script>
