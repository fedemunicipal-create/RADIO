<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADARLAT TV-VIVO</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        #rl-container-fuerza { position: sticky; top: 0; width: 100%; background: #0b0e11; border-bottom: 2px solid #4CAF50; z-index: 2000; }
        .r1-carrusel-centrado { display: flex; overflow-x: auto; gap: 20px; padding: 10px 15px; align-items: center; }
        .r1-carrusel-centrado::-webkit-scrollbar { display: none; }
        .btn-pais { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; min-width: 50px; cursor: pointer; }
        .btn-pais img { width: 44px; height: 30px; border-radius: 4px; border: 2px solid transparent; object-fit: cover; }
        .btn-pais.active img { border-color: #4CAF50; box-shadow: 0 0 10px #4CAF50; }
        .btn-pais span { font-size: 10px; color: #777; margin-top: 5px; font-weight: bold; }
        .btn-pais.active span { color: #4CAF50; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        #main-video-player, #hls-video-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        #main-video-player.active, #hls-video-player.active { display: block; }
        .main-content { padding: 10px 0; min-height: 200px; }
        .country-header { font-size: 1rem; font-weight: bold; color: #fff; margin: 15px; text-transform: uppercase; border-left: 4px solid #4CAF50; padding-left: 12px; }
        .channels-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 0 15px 10px; }
        .logo-box { width: 100px; height: 100px; background: #fff; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
        .logo-box img { width: 80%; height: auto; }
        .channel-name { font-size: 0.75rem; text-align: center; display: block; color: #fff; }
        .bottom-navbar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; z-index: 3000; }
        .nav-link { text-decoration: none; color: #fff; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; }
        .dot { height: 8px; width: 8px; background-color: #ff0000; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px #f00; animation: parpadeo 1.5s infinite; }
        @keyframes parpadeo { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div id="rl-container-fuerza"><div class="r1-carrusel-centrado" id="banderas-carrusel"></div></div>
    <div class="video-container">
        <iframe id="main-video-player" class="active" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <video id="hls-video-player" controls autoplay playsinline></video>
    </div>
    <div id="ad-box" style="width:100%; text-align:center; padding:10px 0; background:#0b0e11;">
        <!-- Espacio Banner Adsterra -->
        <script type="text/javascript">
            atOptions = { 'key' : '2518913e078a8274472eea34aba82089', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://highperformanceformat.com"></script>
    </div>
    <div class="main-content" id="contenedor-canales"></div>
    <nav class="bottom-navbar">
        <a href="LINK_RADIO" class="nav-link"><span class="dot"></span>RADIO</a>
        <a href="LINK_VOLVER" class="nav-link"><span class="dot"></span>VOLVER</a>
        <a href="LINK_PORTALES" class="nav-link"><span class="dot"></span>PORTALES</a>
    </nav>
    <script>
        const paises = [
            {id:'all', n:'TODOS', icon:'🌐'}, {id:'ar', n:'ARG', full:'ARGENTINA', f:'ar'}, {id:'cl', n:'CHI', full:'CHILE', f:'cl'}, 
            {id:'uy', n:'URU', full:'URUGUAY', f:'uy'}, {id:'it', n:'ITA', full:'ITALIA', f:'it'}, {id:'py', n:'PAR', full:'PARAGUAY', f:'py'},
            {id:'br', n:'BRA', full:'BRASIL', f:'br'}, {id:'pe', n:'PER', full:'PERÚ', f:'pe'}, {id:'bo', n:'BOL', full:'BOLIVIA', f:'bo'},
            {id:'ec', n:'ECU', full:'ECUADOR', f:'ec'}, {id:'ve', n:'VEN', full:'VENEZUELA', f:'ve'}, {id:'co', n:'COL', full:'COLOMBIA', f:'co'},
            {id:'mx', n:'MEX', full:'MÉXICO', f:'mx'}, {id:'pa', n:'PAN', full:'PANAMÁ', f:'pa'}, {id:'gt', n:'GUA', full:'GUATEMALA', f:'gt'},
            {id:'sv', n:'SAL', full:'EL SALVADOR', f:'sv'}, {id:'ni', n:'NIC', full:'NICARAGUA', f:'ni'}, {id:'hn', n:'HON', full:'HONDURAS', f:'hn'},
            {id:'cr', n:'COS', full:'COSTA RICA', f:'cr'}, {id:'cu', n:'CUB', full:'CUBA', f:'cu'}, {id:'do', n:'DOM', full:'REP. DOMINICANA', f:'do'},
            {id:'pr', n:'PUE', full:'PUERTO RICO', f:'pr'}, {id:'us', n:'USA', full:'EE.UU.', f:'us'}, {id:'es', n:'ESP', full:'ESPAÑA', f:'es'},
            {id:'fr', n:'FRA', full:'FRANCIA', f:'fr'}, {id:'de', n:'ALE', full:'ALEMANIA', f:'de'}
        ];

        const canalesData = {
            'ar': [{ n: 'TN', l: 'https://youtube.com', img: 'https://wikimedia.org' }],
            'cl': [{ n: 'TVN Chile', l: 'https://youtube.com', img: 'https://wikimedia.org' }],
            'uy': [{ n: 'Canal 5 Uy', l: 'https://vood.io', img: 'https://wikimedia.org' }],
            'it': [{ n: 'Rai News 24', l: 'https://akamaized.net', img: 'https://wikimedia.org' }]
        };

        function renderBanderas() {
            const carrusel = document.getElementById('banderas-carrusel');
            paises.forEach(p => {
                const div = document.createElement('div');
                div.className = `btn-pais ${p.id === 'all' ? 'active' : ''}`;
                div.onclick = () => filtrarRadar(p.id, div);
                const imgStr = p.f ? `<img src="https://flagcdn.com{p.f}.png" alt="${p.n}">` : `<div style="width:44px; height:30px; display:flex; align-items:center; justify-content:center; background:#222; border-radius:4px;">${p.icon}</div>`;
                div.innerHTML = `${imgStr}<span>${p.n}</span>`;
                carrusel.appendChild(div);
            });
        }

        function filtrarRadar(id, el) {
            document.querySelectorAll('.btn-pais').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const container = document.getElementById('contenedor-canales');
            container.innerHTML = "";
            const targets = id === 'all' ? paises.filter(x => x.id !== 'all') : [paises.find(x => x.id === id)];
            
            targets.forEach(p => {
                const card = document.createElement('div');
                card.className = 'rl-card';
                let html = `<div class="country-header">${p.full || p.n}</div>`;
                const items = canalesData[p.id];
                if (items) {
                    html += `<div class="channels-scroll">` + items.map(c => `<div class="channel-item" onclick="cargarContenido('${c.l}')"><div class="logo-box"><img src="${c.img}"></div><span class="channel-name">${c.n}</span></div>`).join('') + `</div>`;
                } else { html += `<div style="padding:0 20px; font-size:0.8rem; color:#444;">Sin señales por ahora</div>`; }
                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        function cargarContenido(url) {
            const yt = document.getElementById('main-video-player'), hls = document.getElementById('hls-video-player');
            yt.src = ""; hls.pause(); yt.classList.remove('active'); hls.classList.remove('active');
            if (url.includes('youtube.com')) { yt.src = url; yt.classList.add('active'); }
            else { hls.classList.add('active'); if (Hls.isSupported()) { const h = new Hls(); h.loadSource(url); h.attachMedia(hls); } else { hls.src = url; } }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = () => { renderBanderas(); filtrarRadar('all', document.querySelector('.btn-pais')); cargarContenido('https://youtube.com'); };
    </script>
</body>
</html>
