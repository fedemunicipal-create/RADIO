<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADARLAT TV-VIVO</title>
    <style>
        /* Estilos Base - Minimalismo Moderno */
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 80px; /* Espacio para el menú inferior */
        }

        /* 1. ESPACIO PARA BANNER DE BANDERAS (Blogger) */
        .banner-container {
            width: 100%;
            background: #111;
            padding: 10px 0;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        /* 2. REPRODUCTOR FIJO SUPERIOR */
        .fixed-player-container {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #000;
            width: 100%;
            aspect-ratio: 16 / 9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .fixed-player-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 3. LISTADO DE PAÍSES Y CARRUSELES */
        .content-body {
            padding: 15px 0;
        }

        .country-section {
            margin-bottom: 25px;
        }

        .country-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 15px 10px;
            padding-left: 10px;
            border-left: 3px solid #ff0000; /* Color distintivo */
        }

        .carousel-container {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 5px 15px 15px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* Ocultar scrollbar pero mantener funcionalidad */
        .carousel-container::-webkit-scrollbar {
            display: none;
        }

        /* TARJETAS DE CANAL */
        .channel-card {
            min-width: 130px;
            max-width: 130px;
            background: #151515;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid #222;
        }

        .channel-card:active {
            transform: scale(0.95);
            background: #222;
        }

        .channel-card img {
            width: 100%;
            height: 70px;
            object-fit: contain;
            border-radius: 4px;
            margin-bottom: 8px;
            background: #000;
        }

        .channel-card span {
            display: block;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 4. MENÚ INFERIOR DE SECCIONES */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 65px;
            background: #111;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
            z-index: 2000;
        }

        .nav-item {
            color: #888;
            text-decoration: none;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-item.active {
            color: #fff;
        }

        .nav-icon {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <p style="font-size: 0.8rem; color: #555;">[ Banner de Banderas / Buscador ]</p>
    </div>

    <div class="fixed-player-container">
        <iframe id="main-video-player" src="about:blank" allowfullscreen></iframe>
    </div>

    <div class="content-body">
        
        <div class="country-section">
            <div class="country-title">Argentina</div>
            <div class="carousel-container">
                <div class="channel-card" onclick="playChannel('URL_YOUTUBE_O_HLS_1')">
                    <img src="https://via.placeholder.com/150x80/000/fff?text=Logo+1" alt="Canal 1">
                    <span>TN en Vivo</span>
                </div>
                <div class="channel-card" onclick="playChannel('URL_YOUTUBE_O_HLS_2')">
                    <img src="https://via.placeholder.com/150x80/000/fff?text=Logo+2" alt="Canal 2">
                    <span>C5N</span>
                </div>
                </div>
        </div>

        <div class="country-section">
            <div class="country-title">México</div>
            <div class="carousel-container">
                <div class="channel-card" onclick="playChannel('URL_MX_1')">
                    <img src="https://via.placeholder.com/150x80/000/fff?text=Logo+MX1" alt="Canal MX1">
                    <span>Azteca 7</span>
                </div>
                <div class="channel-card" onclick="playChannel('URL_MX_2')">
                    <img src="https://via.placeholder.com/150x80/000/fff?text=Logo+MX2" alt="Canal MX2">
                    <span>Canal 5</span>
                </div>
            </div>
        </div>

        <div class="country-section">
            <div class="country-title">Colombia</div>
            <div class="carousel-container">
                <div class="channel-card" onclick="playChannel('URL_CO_1')">
                    <img src="https://via.placeholder.com/150x80/000/fff?text=Logo+CO1" alt="Canal CO1">
                    <span>Caracol TV</span>
                </div>
                <div class="channel-card" onclick="playChannel('URL_CO_2')">
                    <img src="https://via.placeholder.com/150x80/000/fff?text=Logo+CO2" alt="Canal CO2">
                    <span>RCN</span>
                </div>
            </div>
        </div>

    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item">
            <span class="nav-icon">📻</span>
            <span>Radio</span>
        </a>
        <a href="#" class="nav-item active">
            <span class="nav-icon">📺</span>
            <span>TV Vivo</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">📰</span>
            <span>Noticias</span>
        </a>
    </nav>

    <script>
        // Función para cambiar de canal y hacer scroll automático hacia arriba
        function playChannel(url) {
            const player = document.getElementById('main-video-player');
            player.src = url;
            
            // Efecto de scroll suave hacia el reproductor al elegir canal
            window.scrollTo({
                top: document.querySelector('.fixed-player-container').offsetTop,
                behavior: 'smooth'
            });
        }

        // Cargar un canal por defecto al iniciar (opcional)
        window.onload = function() {
            // playChannel('URL_POR_DEFECTO');
        };
    </script>

</body>
