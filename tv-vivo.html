<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADARLAT TV-VIVO</title>
    
    <style>
        /* 1. ESTILOS BASE */
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* 2. BANNER DE BANDERAS (STICKY) */
        #rl-container-fuerza {
            position: sticky;
            top: 0;
            width: 100%;
            background: #0b0e11;
            border-bottom: 2px solid #4CAF50;
            z-index: 2000;
        }

        .r1-carrusel-centrado {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 10px 15px;
            align-items: center;
        }
        .r1-carrusel-centrado::-webkit-scrollbar { display: none; }

        .btn-pais {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 50px;
            cursor: pointer;
        }

        .btn-pais img, .btn-pais .world-icon {
            width: 44px;
            height: 32px;
            border-radius: 6px;
            border: 2px solid transparent;
            object-fit: cover;
        }

        .btn-pais.active img, .btn-pais.active .world-icon {
            border-color: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .world-icon {
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .btn-pais span {
            font-size: 10px;
            color: #777;
            margin-top: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .btn-pais.active span { color: #4CAF50; }

        /* 3. REPRODUCTOR FIJO (16:9) */
        .video-container {
            width: 100%;
            position: relative;
            padding-bottom: 56.25%; /* Relación 16:9 */
            height: 0;
            overflow: hidden;
            background: #000;
            border-bottom: 1px solid #222;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 4. GRILLA DE CANALES */
        .main-content { padding: 10px 0; }
        .country-group { margin-bottom: 30px; }
        .country-header {
            font-size: 0.85rem;
            font-weight: bold;
            color: #ccc;
            margin: 15px 15px 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .channels-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 0 15px 10px;
        }
        .channels-scroll::-webkit-scrollbar { display: none; }

        .channel-item {
            min-width: 115px;
            text-align: center;
            cursor: pointer;
        }

        .logo-box {
            width: 115px;
            height: 115px;
            background: #fff;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .logo-box img { width: 80%; height: auto; object-fit: contain; }

        .channel-name { 
            font-size: 0.8rem; 
            font-weight: bold; 
            display: block;
            color: #fff;
        }

        /* 5. MENÚ INFERIOR */
        .bottom-navbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #1a1a1a;
            z-index: 3000;
        }

        .nav-link {
            text-decoration: none;
            color: #fff;
            font-size: 0.9rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            text-transform: uppercase;
        }

        .dot {
            height: 7px;
            width: 7px;
            background-color: #ff0000;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #ff0000;
            animation: parpadeo_vivo 1.5s infinite;
        }

        @keyframes parpadeo_vivo {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- MENÚ DE BANDERAS -->
    <div id="rl-container-fuerza">
        <div class="r1-carrusel-centrado">
            <div class="btn-pais active" onclick="filtrarRadar('all', this)">
                <div class="world-icon">🌐</div><span>TODOS</span>
            </div>
            <div class="btn-pais" onclick="filtrarRadar('ar', this)"><img src="https://flagcdn.com"><span>ARG</span></div>
            <div class="btn-pais" onclick="filtrarRadar('cl', this)"><img src="https://flagcdn.com"><span>CHI</span></div>
            <div class="btn-pais" onclick="filtrarRadar('uy', this)"><img src="https://flagcdn.com"><span>URU</span></div>
        </div>
    </div>

    <!-- REPRODUCTOR -->
    <div class="video-container">
        <iframe id="main-video-player" 
                src="" 
                frameborder="0" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
        </iframe>
    </div>

    <!-- CONTENIDO DE CANALES -->
    <div class="main-content">
        
        <!-- ARGENTINA -->
        <div class="country-group rl-card ar">
            <div class="country-header">ARGENTINA</div>
            <div class="channels-scroll">
                <div class="channel-item" onclick="cambiarCanal('https://youtube.com')">
                    <div class="logo-box"><img src="https://wikimedia.org"></div>
                    <span class="channel-name">TN Noticias</span>
                </div>
                <div class="channel-item" onclick="cambiarCanal('https://youtube.com')">
                    <div class="logo-box"><img src="https://wikimedia.org"></div>
                    <span class="channel-name">C5N</span>
                </div>
            </div>
        </div>

        <!-- CHILE -->
        <div class="country-group rl-card cl">
            <div class="country-header">CHILE</div>
            <div class="channels-scroll">
                <div class="channel-item" onclick="cambiarCanal('https://youtube.com')">
                    <div class="logo-box"><img src="https://wikimedia.org"></div>
                    <span class="channel-name">TVN Chile</span>
                </div>
                <div class="channel-item" onclick="cambiarCanal('https://youtube.com')">
                    <div class="logo-box"><img src="https://wikimedia.org"></div>
                    <span class="channel-name">24 Horas</span>
                </div>
            </div>
        </div>

        <!-- URUGUAY -->
        <div class="country-group rl-card uy">
            <div class="country-header">URUGUAY</div>
            <div class="channels-scroll">
                <div class="channel-item" onclick="cambiarCanal('https://youtube.com')">
                    <div class="logo-box"><img src="https://wikimedia.org"></div>
                    <span class="channel-name">Canal 5</span>
                </div>
                <div class="channel-item" onclick="cambiarCanal('https://youtube.com')">
                    <div class="logo-box"><img src="https://wikimedia.org"></div>
                    <span class="channel-name">Telemundo</span>
                </div>
            </div>
        </div>

    </div>

    <!-- MENÚ INFERIOR -->
    <nav class="bottom-navbar">
        <a href="#" class="nav-link"><span class="dot"></span>EN VIVO</a>
        <a href="#" class="nav-link">RADIO</a>
        <a href="#" class="nav-link">PORTALES</a>
    </nav>

    <script>
        // 1. Lista de canales para el inicio aleatorio
        const canalesRandom = [
            'https://youtube.com',
            'https://youtube.com',
            'https://youtube.com'
        ];

        // 2. Función para cambiar el video
        function cambiarCanal(url) {
            const player = document.getElementById('main-video-player');
            if (player) {
                player.src = url;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // 3. Función de filtrado por país
        function filtrarRadar(code, el) {
            // Actualizar botones de banderas
            document.querySelectorAll('.btn-pais').forEach(b => b.classList.remove('active'));
            if(el) el.classList.add('active');

            // Filtrar las tarjetas de países
            const items = document.querySelectorAll('.rl-card');
            items.forEach(item => {
                if (code === 'all' || item.classList.contains(code)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // 4. Ejecución al cargar la página
        window.onload = () => {
            const randomUrl = canalesRandom[Math.floor(Math.random() * canalesRandom.length)];
            cambiarCanal(randomUrl);
        };
    </script>
</body>
</html>
