<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADARLAT TV-VIVO</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 90px; /* Espacio para no tapar contenido con el menú */
        }

        /* 1. ESPACIO SUPERIOR PARA BANDERAS (Blogger) */
        .header-banners {
            width: 100%;
            min-height: 50px;
            background: #000;
            padding: 10px 0;
        }

        /* 2. PANTALLA FIJA (ANCHO COMPLETO) */
        .video-container {
            position: sticky;
            top: 0;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 3. LISTADO DE PAÍSES (Formato Grilla/Carrusel) */
        .main-content {
            padding: 10px 0;
        }

        .country-group {
            margin-bottom: 25px;
        }

        .country-header {
            font-size: 0.85rem;
            font-weight: bold;
            color: #ccc;
            margin: 15px 15px 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .channels-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 0 15px 10px;
            scrollbar-width: none; /* Ocultar scroll en Firefox */
        }

        .channels-scroll::-webkit-scrollbar {
            display: none; /* Ocultar scroll en Chrome/Safari */
        }

        /* DISEÑO DE TARJETA (Inspirado en tu imagen) */
        .channel-item {
            min-width: 110px;
            text-align: center;
        }

        .logo-box {
            width: 110px;
            height: 110px;
            background: #fff; /* Fondo blanco como en tu captura */
            border-radius: 20px; /* Bordes redondeados suaves */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            overflow: hidden;
            cursor: pointer;
        }

        .logo-box img {
            width: 80%;
            height: auto;
            object-fit: contain;
        }

        .channel-name {
            font-size: 0.75rem;
            font-weight: bold;
            display: block;
        }

        .channel-origin {
            font-size: 0.65rem;
            color: #777;
        }

        /* 4. MENÚ INFERIOR (Idéntico a tu captura) */
        .bottom-navbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
            z-index: 2000;
        }

        .nav-link {
            text-decoration: none;
            color: #fff;
            font-size: 0.9rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            text-transform: uppercase;
        }

        .dot {
            height: 6px;
            width: 6px;
            background-color: #ff0000; /* Punto rojo */
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 5px #ff0000;
        }

        /* Efecto de selección en el menú */
        .nav-link.active {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="header-banners">
        </div>

    <div class="video-container">
        <iframe id="player" src="" allowfullscreen></iframe>
    </div>

    <div class="main-content">

        <div class="country-group">
            <div class="country-header">ARGENTINA ></div>
            <div class="channels-scroll">
                
                <div class="channel-item" onclick="loadChannel('URL_CANAL_1')">
                    <div class="logo-box">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/4/40/Todo_Noticias_2023.png" alt="TN">
                    </div>
                    <span class="channel-name">TN Todo Noticias</span>
                    <span class="channel-origin">Argentina</span>
                </div>

                <div class="channel-item" onclick="loadChannel('URL_CANAL_2')">
                    <div class="logo-box">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/C5N_Logo_2015.svg/1200px-C5N_Logo_2015.svg.png" alt="C5N">
                    </div>
                    <span class="channel-name">C5N</span>
                    <span class="channel-origin">Argentina</span>
                </div>

            </div>
        </div>

        <div class="country-group">
            <div class="country-header">CHILE ></div>
            <div class="channels-scroll">
                
                <div class="channel-item" onclick="loadChannel('URL_CHILE_1')">
                    <div class="logo-box">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Logo_TVN_2020.svg/1200px-Logo_TVN_2020.svg.png" alt="TVN">
                    </div>
                    <span class="channel-name">TVN Chile</span>
                    <span class="channel-origin">Chile</span>
                </div>

                <div class="channel-item" onclick="loadChannel('URL_CHILE_2')">
                    <div class="logo-box">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Mega_logo_2020.svg/1200px-Mega_logo_2020.svg.png" alt="Mega">
                    </div>
                    <span class="channel-name">Mega</span>
                    <span class="channel-origin">Chile</span>
                </div>

            </div>
        </div>

    </div>

    <nav class="bottom-navbar">
        <a href="URL_VOLVER" class="nav-link">
            <span class="dot"></span> VOLVER
        </a>
        <a href="#" class="nav-link">
            <span class="dot"></span> TV VIVO
        </a>
        <a href="URL_PORTALES" class="nav-link">
            <span class="dot"></span> PORTALES
        </a>
    </nav>

    <script>
        function loadChannel(url) {
            const player = document.getElementById('player');
            player.src = url;
            // Scroll suave hacia arriba para ver el video al clickear
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>

</body>
</html>
