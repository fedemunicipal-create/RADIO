    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        /* BANDERAS - CARGA INMEDIATA */
        #rl-container-fuerza { position: sticky; top: 0; width: 100%; background: #0b0e11; border-bottom: 2px solid #4CAF50; z-index: 2000; }
        .r1-carrusel-centrado { display: flex; overflow-x: auto; gap: 20px; padding: 10px 15px; align-items: center; }
        .r1-carrusel-centrado::-webkit-scrollbar { display: none; }
        .btn-pais { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; min-width: 50px; cursor: pointer; text-decoration: none; }
        .btn-pais img { width: 44px; height: 30px; border-radius: 4px; border: 2px solid transparent; object-fit: cover; background: #222; }
        .btn-pais.active img { border-color: #4CAF50; box-shadow: 0 0 10px #4CAF50; }
        .btn-pais span { font-size: 10px; color: #777; margin-top: 5px; font-weight: bold; }
        .btn-pais.active span { color: #4CAF50; }

        /* REPRODUCTOR */
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        #main-video-player, #hls-video-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        #main-video-player.active, #hls-video-player.active { display: block; }

        /* LISTA DE CANALES */
        .main-content { padding: 10px 0; }
        .rl-card { margin-bottom: 30px; display: block; }
        .country-header { font-size: 1rem; font-weight: bold; color: #fff; margin: 15px; text-transform: uppercase; border-left: 4px solid #4CAF50; padding-left: 12px; }
        .channels-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 0 15px 10px; }
        .logo-box { width: 100px; height: 100px; background: #fff; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
        .logo-box img { width: 80%; height: auto; }
        .channel-name { font-size: 0.75rem; text-align: center; display: block; color: #fff; font-weight: bold; }

        /* MENÚ INFERIOR - 3 LUCES ROJAS */
        .bottom-navbar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; z-index: 3000; }
        .nav-link { text-decoration: none; color: #fff; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; }
        .dot { height: 8px; width: 8px; background-color: #ff0000; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px #f00; animation: parpadeo 1.5s infinite; }
        @keyframes parpadeo { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>

<script>
    function cargarContenido(url) {
        const yt = document.getElementById('main-video-player');
        const hlsPlayer = document.getElementById('hls-video-player');
        yt.src = ""; hlsPlayer.pause();
        yt.classList.remove('active'); hlsPlayer.classList.remove('active');

        if (url.includes('youtube.com')) {
            yt.src = url; yt.classList.add('active');
        } else {
            hlsPlayer.classList.add('active');
            if (Hls.isSupported()) {
                const hls = new Hls(); hls.loadSource(url); hls.attachMedia(hlsPlayer);
            } else if (hlsPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                hlsPlayer.src = url;
            }
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filtrarRadar(id, el) {
        document.querySelectorAll('.btn-pais').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.rl-card').forEach(card => {
            card.style.display = (id === 'all' || card.classList.contains(id)) ? 'block' : 'none';
        });
    }

    window.onload = () => { cargarContenido('https://youtube.com'); };
</script>
