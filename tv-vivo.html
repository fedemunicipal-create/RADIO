<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADARLAT TV-VIVO</title>
    <style>
       
        /* CONFIGURACIÓN BASE - ESTILO MINIMALISTA */
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 90px; /* Espacio para el menú inferior */
            overflow-x: hidden;
        }
   <div id="r1-container-fuerza" style="width: 100%; background: #000; padding: 10px 0; overflow: hidden; position: sticky; top: 0; z-index: 999;">
    
    <div class="r1-carrusel-centrado" style="display: flex !important; flex-direction: row !important; overflow-x: auto !important; white-space: nowrap !important; gap: 15px; padding: 0 15px; align-items: center; -webkit-overflow-scrolling: touch;">
        
        <style>
          
/* Contenedor Principal */
#rl-container-fuerza {
    position: relative;
    width: 100%;
    margin: 0 auto !important;
    padding: 0 !important;
    background: #0b0e11;
    border-bottom: 2px solid #4CAF50;
    z-index: 9999;
}

/* Carrusel Horizontal */
.r1-carrusel-centrado {
    display: flex !important;
    flex-direction: row !important;
    flex-wrap: nowrap !important;
    overflow-x: auto !important;
    -webkit-overflow-scrolling: touch;
    gap: 20px;
    padding: 10px 15px;
    align-items: center;
    justify-content: flex-start;
}

/* Ocultar barra de scroll */
.r1-carrusel-centrado::-webkit-scrollbar {
    display: none;
}

/* Botones de Países */
.btn-pais {
    flex: 0 0 auto;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    text-align: center;
    min-width: 50px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-pais img, .btn-pais .world-icon {
    width: 44px;
    height: 32px;
    border-radius: 6px;
    border: 2px solid transparent;
    object-fit: cover;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

.world-icon {
    background: #222;
    display: flex !important;
    align-items: center;
    justify-content: center;
    font-size: 18px;
}

/* Texto de los países */
.btn-pais span {
    font-size: 10px;
    color: #777;
    margin-top: 5px;
    font-weight: bold;
    text-transform: uppercase;
    font-family: sans-serif;
}

/* ESTADO ACTIVO (Brillo Verde Radar) */
.btn-pais.active img, .btn-pais.active .world-icon {
    border-color: #4CAF50;
    box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
}

.btn-pais.active span {
    color: #4CAF50;
}
</style>

<div id="rl-container-fuerza">
    <div class="r1-carrusel-centrado">
        <div class="btn-pais active" onclick="filtrarRadar('all', this)">
            <div class="world-icon">🌐</div>
            <span>TODOS</span>
        </div>

        <div class="btn-pais" onclick="filtrarRadar('ar', this)"><img src="https://flagcdn.com/w80/ar.png"><span>ARG</span></div>
        <div class="btn-pais" onclick="filtrarRadar('cl', this)"><img src="https://flagcdn.com/w80/cl.png"><span>CHI</span></div>
        <div class="btn-pais" onclick="filtrarRadar('uy', this)"><img src="https://flagcdn.com/w80/uy.png"><span>URU</span></div>
        <div class="btn-pais" onclick="filtrarRadar('py', this)"><img src="https://flagcdn.com/w80/py.png"><span>PAR</span></div>
        <div class="btn-pais" onclick="filtrarRadar('br', this)"><img src="https://flagcdn.com/w80/br.png"><span>BRA</span></div>
        <div class="btn-pais" onclick="filtrarRadar('pe', this)"><img src="https://flagcdn.com/w80/pe.png"><span>PER</span></div>
        <div class="btn-pais" onclick="filtrarRadar('bo', this)"><img src="https://flagcdn.com/w80/bo.png"><span>BOL</span></div>
        <div class="btn-pais" onclick="filtrarRadar('ec', this)"><img src="https://flagcdn.com/w80/ec.png"><span>ECU</span></div>
        <div class="btn-pais" onclick="filtrarRadar('ve', this)"><img src="https://flagcdn.com/w80/ve.png"><span>VEN</span></div>
        <div class="btn-pais" onclick="filtrarRadar('co', this)"><img src="https://flagcdn.com/w80/co.png"><span>COL</span></div>
        <div class="btn-pais" onclick="filtrarRadar('mx', this)"><img src="https://flagcdn.com/w80/mx.png"><span>MEX</span></div>
        <div class="btn-pais" onclick="filtrarRadar('pa', this)"><img src="https://flagcdn.com/w80/pa.png"><span>PAN</span></div>
        <div class="btn-pais" onclick="filtrarRadar('gt', this)"><img src="https://flagcdn.com/w80/gt.png"><span>GUA</span></div>
        <div class="btn-pais" onclick="filtrarRadar('sv', this)"><img src="https://flagcdn.com/w80/sv.png"><span>SAL</span></div>
        <div class="btn-pais" onclick="filtrarRadar('ni', this)"><img src="https://flagcdn.com/w80/ni.png"><span>NIC</span></div>
        <div class="btn-pais" onclick="filtrarRadar('hn', this)"><img src="https://flagcdn.com/w80/hn.png"><span>HON</span></div>
        <div class="btn-pais" onclick="filtrarRadar('cr', this)"><img src="https://flagcdn.com/w80/cr.png"><span>COS</span></div>
        <div class="btn-pais" onclick="filtrarRadar('cu', this)"><img src="https://flagcdn.com/w80/cu.png"><span>CUB</span></div>
        <div class="btn-pais" onclick="filtrarRadar('do', this)"><img src="https://flagcdn.com/w80/do.png"><span>DOM</span></div>
        <div class="btn-pais" onclick="filtrarRadar('pr', this)"><img src="https://flagcdn.com/w80/pr.png"><span>PUE</span></div>
        <div class="btn-pais" onclick="filtrarRadar('us', this)"><img src="https://flagcdn.com/w80/us.png"><span>USA</span></div>
        <div class="btn-pais" onclick="filtrarRadar('es', this)"><img src="https://flagcdn.com/w80/es.png"><span>ESP</span></div>
        <div class="btn-pais" onclick="filtrarRadar('fr', this)"><img src="https://flagcdn.com/w80/fr.png"><span>FRA</span></div>
        <div class="btn-pais" onclick="filtrarRadar('de', this)"><img src="https://flagcdn.com/w80/de.png"><span>ALE</span></div>
    </div>
</div>

<script>
function filtrarRadar(code, el) {
    // 1. Cambiar estética de los botones (el brillo verde)
    document.querySelectorAll('.btn-pais').forEach(b => b.classList.remove('active'));
    el.classList.add('active');

    // 2. Lógica de filtrado para las tarjetas de canales
    // Asegúrate de que tus tarjetas tengan la clase 'rl-card' y la clase del país (ej: 'ar')
    const items = document.querySelectorAll('.rl-card');
    items.forEach(item => {
        if (code === 'all') {
            item.style.display = 'flex';
        } else {
            // Si la tarjeta contiene la clase del país seleccionado, se muestra
            item.style.display = item.classList.contains(code) ? 'flex' : 'none';
        }
    });
}
</script>
 

      
    </style>
</head>
<body>

    <div class="video-container">
        <iframe id="main-video-player" src="about:blank" allowfullscreen></iframe>
    </div>

    <div class="main-content">
        
        <div class="country-group" id="sec-ar">
            <div class="country-header">ARGENTINA ></div>
            <div class="channels-scroll">
                <div class="channel-item" onclick="cambiarCanal('URL_EMBED_TN')">
                    <div class="logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/4/40/Todo_Noticias_2023.png"></div>
                    <span class="channel-name">TN Todo Noticias</span>
                    <span class="channel-origin">Argentina</span>
                </div>
                <div class="channel-item" onclick="cambiarCanal('URL_EMBED_C5N')">
                    <div class="logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/C5N_Logo_2015.svg/1200px-C5N_Logo_2015.svg.png"></div>
                    <span class="channel-name">C5N</span>
                    <span class="channel-origin">Argentina</span>
                </div>
            </div>
        </div>

        <div class="country-group" id="sec-cl">
            <div class="country-header">CHILE ></div>
            <div class="channels-scroll">
                <div class="channel-item" onclick="cambiarCanal('URL_EMBED_TVN')">
                    <div class="logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Logo_TVN_2020.svg/1200px-Logo_TVN_2020.svg.png"></div>
                    <span class="channel-name">TVN Chile</span>
                    <span class="channel-origin">Chile</span>
                </div>
            </div>
        </div>

        </div>

    <nav class="bottom-navbar">
        <a href="#" class="nav-link"><span class="dot"></span> VOLVER</a>
        <a href="#" class="nav-link active"><span class="dot"></span> TV VIVO</a>
        <a href="#" class="nav-link"><span class="dot"></span> PORTALES</a>
    </nav>

    <script>
        // Función para cambiar de canal y subir al reproductor
        function cambiarCanal(url) {
            const player = document.getElementById('main-video-player');
            player.src = url;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

    </script>

</body>
</html>
